<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — PartnerHub</title>
    <link rel="stylesheet" href="css/slds.css">
    <style>
        .view-toggle {
            display: flex;
            gap: 4px;
        }

        .view-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--slds-n7);
            border-radius: 4px;
            background: white;
            cursor: pointer;
            color: var(--slds-n4);
            transition: all .15s;
        }

        .view-btn.active {
            background: var(--slds-brand-light);
            border-color: var(--slds-brand);
            color: var(--slds-brand);
        }

        .select-all-cell {
            width: 40px;
        }
    </style>
</head>

<body>
    <div id="slds-global-header-container"></div>
    <div id="slds-app-nav-container"></div>
    <div id="slds-workspace-tabs-container"></div>

    <div class="slds-body">

        <!-- Object Home Header -->
        <div class="slds-list-header">
            <div class="slds-list-header__icon-title">
                <div class="slds-icon-std ic-order">
                    <svg fill="none" stroke="white" viewBox="0 0 24 24" style="width:20px;height:20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <div class="slds-list-title">Orders</div>
                    <div class="slds-list-subtitle">284 records · Recently Viewed</div>
                </div>
            </div>
            <div class="slds-list-actions">
                <button class="slds-btn slds-btn-neutral" onclick="exportData()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Export
                </button>
                <a href="forward-order-create.html" class="slds-btn slds-btn-brand">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    New Order
                </a>
            </div>
        </div>

        <!-- KPI Row -->
        <div class="ph-kpi-strip">
            <div class="slds-kpi-card ph-kpi-strip-card">
                <div class="slds-kpi-label">Total</div>
                <div class="slds-kpi-value" style="font-size:22px;">284</div>
            </div>
            <div class="slds-kpi-card ph-kpi-strip-card">
                <div class="slds-kpi-label">Processing</div>
                <div class="slds-kpi-value" style="font-size:22px;color:var(--slds-info);">42</div>
            </div>
            <div class="slds-kpi-card ph-kpi-strip-card">
                <div class="slds-kpi-label">Shipped</div>
                <div class="slds-kpi-value" style="font-size:22px;color:var(--slds-purple-text);">67</div>
            </div>
            <div class="slds-kpi-card ph-kpi-strip-card">
                <div class="slds-kpi-label">Delivered</div>
                <div class="slds-kpi-value" style="font-size:22px;color:var(--slds-success);">158</div>
            </div>
            <div class="slds-kpi-card ph-kpi-strip-card">
                <div class="slds-kpi-label">Cancelled</div>
                <div class="slds-kpi-value" style="font-size:22px;color:var(--slds-error);">17</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="slds-filter-bar">
            <div class="slds-search-wrap">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" class="slds-search" placeholder="Search orders by ID, customer, status..."
                    oninput="filterOrders(this.value)">
            </div>

            <select class="slds-select"
                onchange="filterByStatus(this.value)">
                <option value="">All Statuses</option>
                <option value="Processing">Processing</option>
                <option value="Pending">Pending</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>
            </select>

            <select class="slds-select"
                onchange="filterByPriority(this.value)">
                <option value="">All Priorities</option>
                <option value="High">High</option>
                <option value="Normal">Normal</option>
                <option value="Low">Low</option>
            </select>

            <div class="view-toggle" style="margin-left:auto;">
                <button class="view-btn active" title="Table View">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M3 10h18M3 6h18M3 14h18M3 18h18" />
                    </svg>
                </button>
                <button class="view-btn" title="Card View">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="slds-card" style="margin:16px 24px;border-radius:4px;">
            <div class="slds-table-wrap">
                <table class="slds-table" id="orders-table">
                    <thead>
                        <tr>
                            <th class="select-all-cell"><input type="checkbox" class="slds-checkbox" id="select-all"
                                    onchange="toggleSelectAll(this)"></th>
                            <th onclick="sortTable('orders-tbody',1)" style="cursor:pointer;">
                                Order ID
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    style="width:10px;height:10px;display:inline-block;vertical-align:middle;margin-left:3px;opacity:.5;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
                                </svg>
                            </th>
                            <th onclick="sortTable('orders-tbody',2)">
                                Customer
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    style="width:10px;height:10px;display:inline-block;vertical-align:middle;margin-left:3px;opacity:.5;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
                                </svg>
                            </th>
                            <th onclick="sortTable('orders-tbody',3)">Order Date</th>
                            <th>Contact</th>
                            <th onclick="sortTable('orders-tbody',5,'number')">Items</th>
                            <th>Channel</th>
                            <th>Warehouse</th>
                            <th onclick="sortTable('orders-tbody',8)">Status</th>
                            <th>Priority</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <!-- Rows rendered by JS -->
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div
                style="display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-top:1px solid var(--slds-n7);background:var(--slds-n10);">
                <span style="font-size:12px;color:var(--slds-n4);" id="pagination-info">Showing 1–8 of 284
                    records</span>
                <div style="display:flex;gap:4px;">
                    <button class="slds-btn slds-btn-neutral slds-btn-sm" disabled>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:12px;height:12px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <button class="slds-btn slds-btn-neutral slds-btn-sm"
                        style="background:var(--slds-brand);color:white;border-color:var(--slds-brand);">1</button>
                    <button class="slds-btn slds-btn-neutral slds-btn-sm">2</button>
                    <button class="slds-btn slds-btn-neutral slds-btn-sm">3</button>
                    <button class="slds-btn slds-btn-neutral slds-btn-sm">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:12px;height:12px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <div id="slds-toast-zone" class="slds-toast-zone"></div>

    <script src="js/app.js"></script>
    <script>
        initPage('forward-order', 'Orders');

        function renderOrdersTable(data) {
            const tbody = document.getElementById('orders-tbody');
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" class="slds-table-empty">No orders found matching your filters</td></tr>`;
                return;
            }

            const statusBadgeMap = {
                'Processing': 'slds-badge-info', 'Pending': 'slds-badge-warning',
                'Shipped': 'slds-badge-purple', 'Delivered': 'slds-badge-success',
                'Cancelled': 'slds-badge-error'
            };
            const priorityBadgeMap = { 'High': 'slds-badge-error', 'Normal': 'slds-badge-info', 'Low': 'slds-badge-neutral' };

            tbody.innerHTML = data.map(o => `
        <tr>
          <td><input type="checkbox" class="slds-checkbox row-select"></td>
          <td><a href="forward-order-detail.html?id=${o.id}" class="slds-text-link" style="font-weight:600;">${o.id}</a></td>
          <td style="font-weight:500;">${o.customer}</td>
          <td style="color:var(--slds-n4);">${o.date}</td>
          <td style="color:var(--slds-n3);">${o.contact}</td>
          <td>${o.items}</td>
          <td><span style="font-size:11px;color:var(--slds-n4);">${o.channel}</span></td>
          <td><span style="font-size:11px;color:var(--slds-n4);">${o.warehouse}</span></td>
          <td><span class="slds-badge ${statusBadgeMap[o.status] || 'slds-badge-neutral'}">${o.status}</span></td>
          <td><span class="slds-badge ${priorityBadgeMap[o.priority] || 'slds-badge-neutral'}">${o.priority}</span></td>
          <td style="text-align:right;">
            <div style="display:flex;gap:6px;justify-content:flex-end;">
              <a href="forward-order-detail.html?id=${o.id}" class="slds-btn slds-btn-neutral slds-btn-sm">View</a>
              <button class="slds-btn slds-btn-icon slds-btn-sm" title="More Actions" onclick="showRowMenu(event, '${o.id}')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('');
        }

        let currentData = [...PH_FWD_ORDERS];
        let statusFilter = '', priorityFilter = '';

        function applyFilters() {
            const search = document.querySelector('.slds-search')?.value.toLowerCase() || '';
            const filtered = PH_FWD_ORDERS.filter(o => {
                const matchSearch = !search || o.id.toLowerCase().includes(search) || o.customer.toLowerCase().includes(search) || o.status.toLowerCase().includes(search);
                const matchStatus = !statusFilter || o.status === statusFilter;
                const matchPriority = !priorityFilter || o.priority === priorityFilter;
                return matchSearch && matchStatus && matchPriority;
            });
            currentData = filtered;
            renderOrdersTable(filtered);
        }

        function filterOrders(v) { applyFilters(); }
        function filterByStatus(v) { statusFilter = v; applyFilters(); }
        function filterByPriority(v) { priorityFilter = v; applyFilters(); }

        function toggleSelectAll(cb) {
            document.querySelectorAll('.row-select').forEach(c => c.checked = cb.checked);
        }

        function showRowMenu(e, id) {
            e.stopPropagation();
            showToast(`Actions for ${id}: Edit · Clone · Delete`, 'info');
        }

        // Initial render
        renderOrdersTable(PH_FWD_ORDERS);
    </script>
</body>

</html>
