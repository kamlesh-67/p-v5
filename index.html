<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartnerHub — Sign In</title>
  <link rel="stylesheet" href="css/slds.css">
  <style>
    .slds-login-card form { display: flex; flex-direction: column; gap: 0; }
    .slds-divider-text { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--slds-n5); font-size: 12px; }
    .slds-divider-text::before, .slds-divider-text::after { content: ''; flex: 1; height: 1px; background: var(--slds-n7); }
    .slds-login-footer { margin-top: 20px; text-align: center; font-size: 12px; color: var(--slds-n4); }
    .slds-login-footer a { color: var(--slds-brand); }
    .slds-demo-badge { margin: 12px 0 0; padding: 10px 14px; background: var(--slds-info-bg); border: 1px solid #80CBFF; border-radius: 4px; font-size: 12px; color: var(--slds-info-text); }
    .slds-demo-badge strong { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
  </style>
</head>
<body class="slds-login-bg">

  <div class="slds-login-card">
    <!-- Logo -->
    <div class="slds-login-logo">
      <div class="slds-login-logo-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:30px;height:30px;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <div class="slds-login-title">PartnerHub</div>
      <div class="slds-login-sub">WMS Enterprise Platform</div>
    </div>

    <!-- Form -->
    <form onsubmit="handleLogin(event)" novalidate>
      <div class="slds-form-element">
        <label class="slds-form-label" for="email">Username or Email</label>
        <div class="slds-form-element__control">
          <input class="slds-input" type="email" id="email" name="email" placeholder="user@company.com" autocomplete="username" required>
        </div>
      </div>

      <div class="slds-form-element">
        <label class="slds-form-label" for="password">
          Password
          <a href="#" style="float:right;font-weight:400;font-size:11px;">Forgot?</a>
        </label>
        <div class="slds-form-element__control">
          <input class="slds-input" type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <input class="slds-checkbox" type="checkbox" id="remember" style="margin:0;">
        <label for="remember" style="font-size:13px;color:var(--slds-n3);cursor:pointer;">Remember me</label>
      </div>

      <button type="submit" class="slds-btn slds-btn-brand" style="width:100%;height:40px;font-size:14px;">
        Log In to PartnerHub
      </button>
    </form>

    <!-- Demo hint -->
    <div class="slds-demo-badge">
      <strong>Demo Access</strong>
      Enter any email and password to continue
    </div>

    <div class="slds-login-footer">
      Need access? <a href="#">Contact your administrator</a>
      <br><br>
      <span style="color:var(--slds-n6);">© 2026 PartnerHub · Privacy · Terms</span>
    </div>
  </div>

  <div id="slds-toast-zone" class="slds-toast-zone"></div>

  <script src="js/app.js"></script>
</body>
</html>
